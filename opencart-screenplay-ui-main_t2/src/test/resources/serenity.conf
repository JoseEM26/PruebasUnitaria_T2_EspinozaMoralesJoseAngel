webdriver {
  driver = chrome
  autodownload = true
  capabilities {
    "goog:chromeOptions" {
      args = ["--start-maximized", "--incognito", "--remote-allow-origins=*"]
    }
  }
}

serenity {
  take.screenshots = FOR_FAILURES
}

environments {
  default {
    webdriver.base.url = "https://naveenautomationlabs.com/opencart"
  }
}